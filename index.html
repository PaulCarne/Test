<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Watch the Video</title>

<style>
  body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    text-align:center;
    background:#000000;
    overflow:hidden;
  }

  #background,#overlay-permanent,#overlay-paused{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
  }

  #background{z-index:1;}
  #overlay-permanent{background:transparent;z-index:4;}
  #overlay-paused{display:none;background:transparent;z-index:5;}

  #content{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:10px;
    box-sizing:border-box;
  }

  #player{
    width:100%;
    height:100%;
    max-width:100%;
    max-height:100%;
    border:none;
    z-index:3;
  }

  /* Progress bar (line) */
  #progress-container{
    position:absolute;
    left: clamp(12px, 2vw, 24px);
    right: clamp(12px, 2vw, 24px);
    bottom: clamp(10px, 1.6vh, 18px);
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.25);
    z-index: 6;
    pointer-events: none; /* don't block taps */
    overflow: hidden;
  }

  #progress-bar{
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.9);
    border-radius: 999px;
    transform-origin: left center;
  }

  /* PLAY / PAUSE BUTTON */
  .button{
    font-size:180%;
    position:absolute;
    bottom:20px;
    left:clamp(30px,4vw,60px);
    border:1px solid transparent;
    height:1em;
    width:1em;
    padding:.25em;
    border-radius:50%;
    transition:all 0.3s ease;
    cursor:pointer;
    z-index:7; /* above progress bar */
    opacity:1;
  }

  /* hidden state */
  .button.hidden{
    opacity:0;
    pointer-events:none;
  }

  .button:before{
    content:"";
    position:absolute;
    top:.25em;
    left:.5em;
    transition:all 0.25s ease;
    border:.5em solid transparent;
    border-right-width:0;
    height:0;
    width:0;
  }

  .play{border-color:green;}
  .play:before{border-left:.75em solid green;}

  .paused{
    border-radius:5%;
    border-color:red;
  }

  .paused:before{
    border-width:0;
    border-left:.4em solid red;
    border-right:.4em solid red;
    height:1em;
    width:.2em;
    left:.25em;
  }

  /* MOBILE */
  @media screen and (max-width:768px){
    .button{
      bottom:calc(20px - 1%);
      left:clamp(28px,6vw,50px);
      width:30px;
      height:30px;
    }

    #progress-container{
      left: clamp(10px, 3vw, 18px);
      right: clamp(10px, 3vw, 18px);
      bottom: clamp(8px, 1.4vh, 14px);
      height: 4px;
    }
  }
</style>
</head>

<body>
<div id="background"></div>

<div id="content">
  <div id="player"></div>

  <div id="overlay-permanent"></div>
  <div id="overlay-paused"></div>

  <!-- Progress line -->
  <div id="progress-container" aria-hidden="true">
    <div id="progress-bar"></div>
  </div>

  <div class="button play" aria-label="Play/Pause Button"></div>

  <button id="start-button" class="control-button" style="display:none;" aria-label="Start Video Button">
    <svg viewBox="0 0 24 24">
      <polygon points="6,4 20,12 6,20"></polygon>
    </svg>
  </button>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
  var player;
  var hideTimer;

  var progressRafId = null;
  var progressBarEl = null;

  // =========================
  // Skip-prevention + Resume
  // =========================

  // Use a unique key per videoId so different inductions don't collide
  var VIDEO_ID = 'OOv7NcgVRzk';
  var STORAGE_KEY = 'yt_induction_' + VIDEO_ID;

  // Tuning parameters
  var ENFORCE_INTERVAL_MS = 500;     // how often we check for illegal skips
  var SAVE_INTERVAL_MS = 1000;       // how often we persist watch state
  var SEEK_TOLERANCE_SEC = 1.5;      // allow small drift/buffer jumps
  var RESUME_BACKOFF_SEC = 0.25;     // resume slightly earlier for smoother continuity

  var maxWatchedTime = 0;            // highest allowed watched point
  var lastKnownTime = 0;             // last sampled time
  var enforceTimer = null;
  var saveTimer = null;
  var isRestoring = true;            // prevents false skip detection during initial seek

  function loadWatchState(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  }

  function saveWatchState(){
    if (!player || typeof player.getCurrentTime !== 'function') return;

    var t = player.getCurrentTime() || 0;

    // Persist the highest allowed point and last position
    var state = {
      t: t,
      max: maxWatchedTime,
      updatedAt: Date.now()
    };

    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      // ignore storage failures
    }
  }

  function clearWatchState(){
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  function restoreWatchStateIfAny(){
    var state = loadWatchState();
    if (!state) {
      isRestoring = false;
      return;
    }

    // Restore max watched first (safety cap)
    if (typeof state.max === 'number' && isFinite(state.max)) {
      maxWatchedTime = Math.max(0, state.max);
    }

    // Restore last position, but never beyond maxWatchedTime
    var resumeTime = 0;
    if (typeof state.t === 'number' && isFinite(state.t)) {
      resumeTime = Math.max(0, state.t - RESUME_BACKOFF_SEC);
    }

    resumeTime = Math.min(resumeTime, maxWatchedTime);

    // If they've already completed it, start from beginning (optional)
    // You could also redirect to the form here if desired.
    if (maxWatchedTime > 0 && player.getDuration && player.getDuration() > 0) {
      // keep as-is
    }

    // Seek after the player is ready
    try {
      if (resumeTime > 0.5) {
        player.seekTo(resumeTime, true);
        lastKnownTime = resumeTime;
      }
    } catch (e) {}

    // Give it a moment before enforcement begins so we don't "snap back"
    setTimeout(function(){
      isRestoring = false;
    }, 1200);
  }

  function startEnforcement(){
    stopEnforcement();

    enforceTimer = setInterval(function(){
      if (!player || typeof player.getCurrentTime !== 'function') return;

      var state = player.getPlayerState ? player.getPlayerState() : null;
      var current = player.getCurrentTime() || 0;

      // Update maxWatchedTime only when actually progressing in playback
      // PLAYING (1) and BUFFERING (3) are the main ones where time can advance.
      if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
        if (current > maxWatchedTime) {
          maxWatchedTime = current;
        }
      }

      // Skip prevention: allow rewind, block big forward jumps beyond maxWatchedTime
      // Avoid enforcement during initial restore to prevent false positives.
      if (!isRestoring) {
        var illegalForward = current > (maxWatchedTime + SEEK_TOLERANCE_SEC);

        // Also detect sudden jumps forward compared to lastKnownTime
        var jumpedForward = (current - lastKnownTime) > (ENFORCE_INTERVAL_MS / 1000) + SEEK_TOLERANCE_SEC;

        if (illegalForward || jumpedForward) {
          // Snap back to maxWatchedTime (or slightly behind)
          var snapTo = Math.max(0, maxWatchedTime - 0.1);
          try { player.seekTo(snapTo, true); } catch (e) {}
        }
      }

      lastKnownTime = current;
    }, ENFORCE_INTERVAL_MS);

    saveTimer = setInterval(saveWatchState, SAVE_INTERVAL_MS);
  }

  function stopEnforcement(){
    if (enforceTimer) clearInterval(enforceTimer);
    if (saveTimer) clearInterval(saveTimer);
    enforceTimer = null;
    saveTimer = null;
  }

  // Save state on refresh/close
  window.addEventListener('beforeunload', function(){
    saveWatchState();
  });

  // =========================
  // UI helpers (your controls)
  // =========================

  function showControls(){
    const button = document.querySelector('.button');
    button.classList.remove('hidden');

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      button.classList.add('hidden');
    }, 3000);
  }

  function clampPercent(p){
    if (!isFinite(p)) return 0;
    return Math.max(0, Math.min(100, p));
  }

  function updateProgress(){
    if (!player || typeof player.getDuration !== 'function') {
      progressRafId = requestAnimationFrame(updateProgress);
      return;
    }

    var duration = player.getDuration();
    var current = player.getCurrentTime ? player.getCurrentTime() : 0;

    if (duration && duration > 0 && progressBarEl) {
      var pct = clampPercent((current / duration) * 100);
      progressBarEl.style.width = pct + '%';
    }

    progressRafId = requestAnimationFrame(updateProgress);
  }

  function startProgressLoop(){
    if (!progressBarEl) progressBarEl = document.getElementById('progress-bar');
    if (progressRafId) cancelAnimationFrame(progressRafId);
    progressRafId = requestAnimationFrame(updateProgress);
  }

  function stopProgressLoop(){
    if (progressRafId) cancelAnimationFrame(progressRafId);
    progressRafId = null;
  }

  // =========================
  // YouTube Player
  // =========================

  function onYouTubeIframeAPIReady(){
    player = new YT.Player('player', {
      videoId: VIDEO_ID,
      playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'playsinline': 1, 'rel': 0 },
      events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
    });
  }

  function onPlayerReady(event){
    // Start playing, unmute (your original behaviour)
    event.target.playVideo();
    player.unMute();

    // Restore resume + maxWatchedTime (then begin enforcement)
    restoreWatchStateIfAny();
    startEnforcement();

    showControls();
    startProgressLoop();
  }

  function onPlayerStateChange(event){
    if (event.data === YT.PlayerState.ENDED){
      // Save completion state, then clear it (optional, but keeps next run clean)
      saveWatchState();
      clearWatchState();

      stopEnforcement();
      stopProgressLoop();

      window.location.href = "https://forms.office.com/r/75jdBjwfDw";
    }
    else if (event.data === YT.PlayerState.PAUSED){
      document.querySelector('.button').classList.remove('paused');
      document.querySelector('.button').classList.add('play');

      // Still save state while paused (so refresh keeps position)
      saveWatchState();
      showControls();
    }
    else if (event.data === YT.PlayerState.PLAYING){
      document.querySelector('.button').classList.remove('play');
      document.querySelector('.button').classList.add('paused');

      showControls();
    }
  }

  document.querySelector('.button').addEventListener('click', function(e){
    // Prevent the "tap anywhere" listener from double-firing
    e.stopPropagation();

    showControls();

    if (this.classList.contains('play')){
      player.playVideo();
      this.classList.remove('play');
      this.classList.add('paused');
    } else {
      player.pauseVideo();
      this.classList.remove('paused');
      this.classList.add('play');
    }

    // Save after user action
    saveWatchState();
  });

  // show controls when screen tapped (use #content rather than whole document)
  document.getElementById('content').addEventListener('click', function(){
    showControls();
  });

  function onYouTubeIframeAPIError(event){
    console.error('YouTube API Error:', event);
  }

  document.addEventListener('DOMContentLoaded', function(){
    progressBarEl = document.getElementById('progress-bar');

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
  });
</script>

</body>
</html>
