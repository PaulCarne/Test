<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Watch the Video</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  text-align:center;
  background:#000;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

#background,#overlay-permanent,#overlay-paused{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

#background{z-index:1;}
#overlay-permanent{background:transparent;z-index:4;}
#overlay-paused{display:none;background:transparent;z-index:5;}

#content{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:10px;
  box-sizing:border-box;
}

#player{
  width:100%;
  height:100%;
  max-width:100%;
  max-height:100%;
  border:none;
  z-index:3;
}

/* cover to hide youtube flash */
#player-cover{
  position:absolute;
  inset:0;
  background:#000;
  z-index:4;
  opacity:1;
  transition:opacity 0.8s ease;
  pointer-events:none;
}
#player-cover.hidden{ opacity:0; }

/* youtube recommendation mask */
#youtube-mask{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:260px;
  background:#000;
  display:none;
  z-index:5;
  pointer-events:none;
}

/* header badge (top right) */
#brand-chip{
  position:absolute;
  top: clamp(12px, 2vh, 22px);
  right: clamp(12px, 2vw, 22px);
  z-index:8;
  pointer-events:none;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,140,0,0.55);
  color:#fff;
  font-size:14px;
  letter-spacing:0.2px;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}

/* dot moved to the right */
#brand-chip span{
  display:inline-block;
  width:10px;
  height:10px;
  margin-left:10px;
  border-radius:50%;
  background:#ff8c00;
  vertical-align:middle;
}

/* tap hint (top right under badge) */
#tap-hint{
  position:absolute;
  top: clamp(54px, 8vh, 86px);
  right: clamp(12px, 2vw, 22px);
  z-index:8;
  pointer-events:none;
  padding:8px 12px;
  border-radius:10px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.9);
  font-size:13px;
  opacity:0;
  transform:translateY(-4px);
  transition:opacity 0.4s ease, transform 0.4s ease;
}
#tap-hint.visible{
  opacity:1;
  transform:translateY(0);
}

/* fade overlay (hardened + ease-out) */
#fade-overlay{
  position:absolute;
  inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  z-index:9999;
  transition:opacity 2s ease-out;
}
#fade-overlay.visible{ opacity:1; }

/* warning message */
#skip-warning{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:#ffffff;
  padding:18px 28px;
  border-radius:8px;
  font-size:18px;
  z-index:9;
  border:2px solid #ff8c00;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s ease;
}
#skip-warning.visible{ opacity:1; }

/* progress bar */
#progress-container{
  position:absolute;
  left: clamp(12px, 2vw, 24px);
  right: clamp(12px, 2vw, 24px);
  bottom: clamp(10px, 1.6vh, 18px);
  height:4px;
  border-radius:999px;
  background: rgba(255,140,0,0.25);
  z-index:6;
  pointer-events:none;
  overflow:hidden;
}

@keyframes progressGlow{
  0%{box-shadow:0 0 2px rgba(255,140,0,0.4);}
  50%{box-shadow:0 0 8px rgba(255,140,0,0.9);}
  100%{box-shadow:0 0 2px rgba(255,140,0,0.4);}
}

#progress-bar{
  height:100%;
  width:0%;
  background:#ff8c00;
  border-radius:999px;
  transform-origin:left center;
  transition:width 0.1s linear;
  animation:progressGlow 2.2s infinite;
}

/* pause pulse (enhanced glow) */
@keyframes pausePulse{
  0%{
    opacity:0.65;
    box-shadow:0 0 4px rgba(255,140,0,0.4);
  }
  50%{
    opacity:1;
    box-shadow:0 0 14px rgba(255,140,0,1);
  }
  100%{
    opacity:0.65;
    box-shadow:0 0 4px rgba(255,140,0,0.4);
  }
}

.paused-progress{
  animation: pausePulse 1.2s infinite;
  box-shadow:0 0 10px rgba(255,140,0,0.9);
}

/* play/pause button (more prominent) */
.button{
  font-size:200%;
  position:absolute;
  bottom:20px;
  left:clamp(30px,4vw,60px);
  height:1.3em;
  width:1.3em;
  padding:.3em;
  border-radius:50%;
  cursor:pointer;
  z-index:7;
  opacity:1;

  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.9);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);

  box-shadow:0 0 12px rgba(0,0,0,0.6);
  transition:all 0.25s ease;
}

.button.hidden{
  opacity:0;
  pointer-events:none;
}

/* icon */
.button:before{
  content:"";
  position:absolute;
  top:.3em;
  left:.55em;
  transition:all 0.25s ease;
  border:.55em solid transparent;
  border-right-width:0;
  height:0;
  width:0;
}

/* play pulses gently */
@keyframes playPulse{
  0%{
    transform:scale(1);
    box-shadow:0 0 10px rgba(255,255,255,0.4);
  }
  50%{
    transform:scale(1.08);
    box-shadow:0 0 18px rgba(255,255,255,0.8);
  }
  100%{
    transform:scale(1);
    box-shadow:0 0 10px rgba(255,255,255,0.4);
  }
}

.play{
  border-color:#ffffff;
  animation:playPulse 2.2s infinite ease-in-out;
}
.play:before{
  border-left:.85em solid #ffffff;
}

/* paused icon */
.paused{
  border-radius:14%;
  border-color:#ffffff;
  animation:none;
}
.paused:before{
  border-width:0;
  border-left:.35em solid #ffffff;
  border-right:.35em solid #ffffff;
  height:1.05em;
  width:.25em;
  left:.42em;
  top:.28em;
}

/* When paused, move button into middle of black ribbon */
.button.in-mask{
  left:50%;
  transform:translateX(-50%);
  bottom:130px;
}

@media screen and (max-width:768px){
  .button{
    bottom:calc(20px - 1%);
    left:clamp(28px,6vw,50px);
    width:30px;
    height:30px;
    font-size:185%;
    padding:.25em;
  }

  #progress-container{
    left: clamp(10px, 3vw, 18px);
    right: clamp(10px, 3vw, 18px);
    bottom: clamp(8px, 1.4vh, 14px);
    height:4px;
  }

  #youtube-mask{ height:320px; }
  .button.in-mask{ bottom:160px; }
}
</style>
</head>

<body>
<div id="background"></div>

<div id="content">
  <div id="player"></div>

  <div id="player-cover"></div>
  <div id="youtube-mask"></div>

  <div id="brand-chip">Health and Safety Induction<span></span></div>
  <div id="tap-hint">Tap anywhere to show controls</div>

  <div id="overlay-permanent"></div>
  <div id="overlay-paused"></div>

  <div id="skip-warning">You must watch the entire video before you can submit your details</div>

  <div id="progress-container"><div id="progress-bar"></div></div>
  <div class="button play" aria-label="Play/Pause Button"></div>

  <div id="fade-overlay"></div>
</div>

<script>
var player;
var hideTimer;
var progressBarEl;
var progressRafId;

var maxWatchedTime = 0;
var STORAGE_KEY = "videoProgress_OOv7NcgVRzk";
var fadeTriggered = false;
var videoCompleted = false;

function showControls(){
  const button = document.querySelector('.button');
  button.classList.remove('hidden');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(()=>{ button.classList.add('hidden'); }, 3000);
}

function showWarning(){
  var warning = document.getElementById("skip-warning");
  warning.classList.add("visible");
  setTimeout(function(){ warning.classList.remove("visible"); }, 2000);
}

function showTapHint(){
  var hint = document.getElementById("tap-hint");
  hint.classList.add("visible");
  setTimeout(function(){ hint.classList.remove("visible"); }, 2200);
}

function checkForEnding(){
  if (!player || typeof player.getDuration !== 'function') return;

  var duration = player.getDuration() || 0;
  var current = player.getCurrentTime ? player.getCurrentTime() : 0;

  /* fade starts 2 seconds before end */
  if (duration > 0 && (duration - current) <= 2 && !fadeTriggered){
    fadeTriggered = true;
    document.getElementById("fade-overlay").classList.add("visible");
  }
}

function updateProgress(){
  var duration = player.getDuration();
  var current = player.getCurrentTime();

  if (duration > 0){
    var percent = (current/duration) * 100;
    progressBarEl.style.width = percent + "%";

    /* completion lock */
    if (percent >= 98){
      videoCompleted = true;
    }
  }

  checkForEnding();
  progressRafId = requestAnimationFrame(updateProgress);
}

function enforceRules(){
  var current = player.getCurrentTime();

  /* block skipping forward */
  if (current > maxWatchedTime + 1.5){
    player.seekTo(maxWatchedTime, true);
    showWarning();
  }

  if (current > maxWatchedTime){
    maxWatchedTime = current;
  }

  localStorage.setItem(STORAGE_KEY, maxWatchedTime);

  /* force 1x speed */
  if (player.getPlaybackRate && player.getPlaybackRate() !== 1){
    player.setPlaybackRate(1);
  }

  /* force unmute */
  if (player.isMuted && player.isMuted()){
    player.unMute();
  }
}

function restoreProgress(){
  var saved = parseFloat(localStorage.getItem(STORAGE_KEY));
  if (saved && saved > 0){
    player.seekTo(Math.max(0, saved - 0.25), true);
    maxWatchedTime = saved;
  }
}

function onYouTubeIframeAPIReady(){
  player = new YT.Player('player', {
    host: 'https://www.youtube-nocookie.com',
    videoId:'OOv7NcgVRzk',
    playerVars:{
      autoplay:1,
      controls:0,
      mute:1,
      playsinline:1,
      rel:0,
      modestbranding:1,
      iv_load_policy:3,
      disablekb:1,
      fs:0,
      origin:window.location.origin
    },
    events:{
      onReady:onPlayerReady,
      onStateChange:onPlayerStateChange
    }
  });
}

function onPlayerReady(event){
  event.target.playVideo();
  player.unMute();

  restoreProgress();
  showControls();
  showTapHint();

  progressBarEl = document.getElementById("progress-bar");
  progressRafId = requestAnimationFrame(updateProgress);

  setInterval(enforceRules, 500);
}

function onPlayerStateChange(event){
  const btn = document.querySelector('.button');

  if (event.data === YT.PlayerState.PLAYING){
    document.getElementById("player-cover").classList.add("hidden");
    document.getElementById("youtube-mask").style.display = "none";

    btn.classList.remove('in-mask');
    btn.classList.remove('play');
    btn.classList.add('paused');

    document.getElementById("progress-bar").classList.remove("paused-progress");
    showControls();
  }
  else if (event.data === YT.PlayerState.PAUSED){
    btn.classList.add('in-mask');
    btn.classList.remove('paused');
    btn.classList.add('play');

    document.getElementById("progress-bar").classList.add("paused-progress");
    document.getElementById("youtube-mask").style.display = "block";
    showControls();
  }
  else if (event.data === YT.PlayerState.ENDED){
    /* completion lock prevents last-second refresh bypass */
    if (videoCompleted){
      localStorage.removeItem(STORAGE_KEY);
      window.location.href="https://forms.office.com/r/75jdBjwfDw";
    }
  }
}

document.querySelector('.button').addEventListener('click', function(e){
  e.stopPropagation();
  showControls();

  if (this.classList.contains('play')){
    player.playVideo();
    this.classList.remove('play');
    this.classList.add('paused');
  } else {
    player.pauseVideo();
    this.classList.remove('paused');
    this.classList.add('play');
  }
});

document.getElementById('content').addEventListener('click', function(){
  showControls();
});

document.addEventListener('DOMContentLoaded', function(){
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
});
</script>

</body>
</html>
