<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Watch the Video</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  text-align:center;
  background:#000000;
  overflow:hidden;
}

#background,#overlay-permanent,#overlay-paused{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

#background{z-index:1;}
#overlay-permanent{background:transparent;z-index:4;}
#overlay-paused{display:none;background:transparent;z-index:5;}

#content{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:10px;
  box-sizing:border-box;
}

#player{
  width:100%;
  height:100%;
  max-width:100%;
  max-height:100%;
  border:none;
  z-index:3;
}

/* Mask to hide YouTube "more videos" shelf when paused */
#youtube-mask{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:140px; /* adjust if needed */
  background:#000;
  display:none;
  z-index:5;
  pointer-events:none;
}

/* Fade to black overlay */
#fade-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  opacity:0;
  pointer-events:none;
  z-index:10;
  transition:opacity 2s ease;
}
#fade-overlay.visible{
  opacity:1;
}

/* warning message */
#skip-warning{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:#ffffff;
  padding:18px 28px;
  border-radius:8px;
  font-size:18px;
  z-index:9;
  border:2px solid #ff8c00;

  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s ease;
}
#skip-warning.visible{
  opacity:1;
}

/* progress bar */
#progress-container{
  position:absolute;
  left: clamp(12px, 2vw, 24px);
  right: clamp(12px, 2vw, 24px);
  bottom: clamp(10px, 1.6vh, 18px);
  height:4px;
  border-radius:999px;
  background: rgba(255,140,0,0.25);
  z-index:6;
  pointer-events:none;
  overflow:hidden;
}

#progress-bar{
  height:100%;
  width:0%;
  background:#ff8c00;
  border-radius:999px;
  transform-origin:left center;
  transition:width 0.1s linear;
}

/* pulse animation */
@keyframes pausePulse{
  0%{opacity:0.6;}
  50%{opacity:1;}
  100%{opacity:0.6;}
}
.paused-progress{
  animation: pausePulse 1.2s infinite;
}

/* play pause button */
.button{
  font-size:180%;
  position:absolute;
  bottom:20px;
  left:clamp(30px,4vw,60px);
  border:1px solid transparent;
  height:1em;
  width:1em;
  padding:.25em;
  border-radius:50%;
  transition:all 0.3s ease;
  cursor:pointer;
  z-index:7;
  opacity:1;
}

.button.hidden{
  opacity:0;
  pointer-events:none;
}

.button:before{
  content:"";
  position:absolute;
  top:.25em;
  left:.5em;
  transition:all 0.25s ease;
  border:.5em solid transparent;
  border-right-width:0;
  height:0;
  width:0;
}

.play{border-color:green;}
.play:before{border-left:.75em solid green;}

.paused{
  border-radius:5%;
  border-color:red;
}

.paused:before{
  border-width:0;
  border-left:.4em solid red;
  border-right:.4em solid red;
  height:1em;
  width:.2em;
  left:.25em;
}

@media screen and (max-width:768px){
  .button{
    bottom:calc(20px - 1%);
    left:clamp(28px,6vw,50px);
    width:30px;
    height:30px;
  }

  #progress-container{
    left: clamp(10px, 3vw, 18px);
    right: clamp(10px, 3vw, 18px);
    bottom: clamp(8px, 1.4vh, 14px);
    height:4px;
  }

  #youtube-mask{
    height:160px;
  }
}
</style>
</head>

<body>
<div id="background"></div>

<div id="content">

  <div id="player"></div>
  <div id="youtube-mask"></div>

  <div id="overlay-permanent"></div>
  <div id="overlay-paused"></div>

  <div id="skip-warning">
    You must watch the entire video before you can submit your details
  </div>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div class="button play" aria-label="Play/Pause Button"></div>

  <div id="fade-overlay"></div>
</div>

<script>
var player;
var hideTimer;

var progressBarEl;
var progressRafId;

var maxWatchedTime=0;
var STORAGE_KEY="videoProgress_OOv7NcgVRzk";

var fadeTriggered = false;

/* controls */
function showControls(){
  const button=document.querySelector('.button');

  button.classList.remove('hidden');
  clearTimeout(hideTimer);

  hideTimer=setTimeout(()=>{
    button.classList.add('hidden');
  },3000);
}

/* warning */
function showWarning(){
  var warning=document.getElementById("skip-warning");
  warning.classList.add("visible");

  setTimeout(function(){
    warning.classList.remove("visible");
  },2000);
}

/* fade-to-black when close to ending */
function checkForEnding(){
  if (!player || typeof player.getDuration !== 'function') return;

  var duration = player.getDuration() || 0;
  var current = player.getCurrentTime ? player.getCurrentTime() : 0;

  if (duration > 0 && (duration - current) <= 3 && !fadeTriggered){
    fadeTriggered = true;
    document.getElementById("fade-overlay").classList.add("visible");
  }
}

/* progress */
function updateProgress(){
  var duration=player.getDuration();
  var current=player.getCurrentTime();

  if(duration>0){
    var pct=(current/duration)*100;
    progressBarEl.style.width=pct+"%";
  }

  checkForEnding();
  progressRafId=requestAnimationFrame(updateProgress);
}

/* enforcement */
function enforceRules(){
  var current=player.getCurrentTime();

  if(current>maxWatchedTime+1.5){
    player.seekTo(maxWatchedTime,true);
    showWarning();
  }

  if(current>maxWatchedTime){
    maxWatchedTime=current;
  }

  localStorage.setItem(STORAGE_KEY,maxWatchedTime);

  // force 1x speed
  if(player.getPlaybackRate && player.getPlaybackRate()!==1){
    player.setPlaybackRate(1);
  }

  // prevent muting
  if(player.isMuted && player.isMuted()){
    player.unMute();
  }
}

/* restore progress */
function restoreProgress(){
  var saved=parseFloat(localStorage.getItem(STORAGE_KEY));
  if(saved && saved>0){
    player.seekTo(Math.max(0, saved-0.25), true);
    maxWatchedTime=saved;
  }
}

/* youtube player */
function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{
    host: 'https://www.youtube-nocookie.com',
    videoId:'OOv7NcgVRzk',
    playerVars:{
      autoplay:1,
      controls:0,
      mute:1,
      playsinline:1,
      rel:0,

      modestbranding:1,
      iv_load_policy:3,
      disablekb:1,
      fs:0,
      origin: window.location.origin
    },
    events:{
      onReady:onPlayerReady,
      onStateChange:onPlayerStateChange
    }
  });
}

function onPlayerReady(event){
  event.target.playVideo();
  player.unMute();

  restoreProgress();
  showControls();

  progressBarEl=document.getElementById("progress-bar");
  progressRafId=requestAnimationFrame(updateProgress);

  setInterval(enforceRules,500);
}

function onPlayerStateChange(event){
  if(event.data===YT.PlayerState.ENDED){
    localStorage.removeItem(STORAGE_KEY);
    window.location.href="https://forms.office.com/r/75jdBjwfDw";
  }
  else if(event.data===YT.PlayerState.PAUSED){
    document.querySelector('.button').classList.remove('paused');
    document.querySelector('.button').classList.add('play');

    document.getElementById("progress-bar").classList.add("paused-progress");

    // Hide YouTube bottom shelf
    document.getElementById("youtube-mask").style.display="block";

    showControls();
  }
  else if(event.data===YT.PlayerState.PLAYING){
    document.querySelector('.button').classList.remove('play');
    document.querySelector('.button').classList.add('paused');

    document.getElementById("progress-bar").classList.remove("paused-progress");

    // Remove mask while playing
    document.getElementById("youtube-mask").style.display="none";

    showControls();
  }
}

document.querySelector('.button').addEventListener('click',function(e){
  e.stopPropagation();

  showControls();

  if(this.classList.contains('play')){
    player.playVideo();
    this.classList.remove('play');
    this.classList.add('paused');
  } else {
    player.pauseVideo();
    this.classList.remove('paused');
    this.classList.add('play');
  }
});

document.getElementById('content').addEventListener('click',function(){
  showControls();
});

document.addEventListener('DOMContentLoaded',function(){
  var tag=document.createElement('script');
  tag.src="https://www.youtube.com/iframe_api";

  var firstScriptTag=document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag,firstScriptTag);
});
</script>

</body>
</html>
